<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TinoTrader</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #0d0d0d;
    color: white;
}

/* Encabezado */
header {
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

/* Contenedor principal */
.container {
    padding: 80px 20px;
    max-width: 900px;
    margin: auto;
}

h1 {
    font-size: 42px;
    margin-bottom: 15px;
}

p {
    font-size: 18px;
    color: #b3b3b3;
    line-height: 1.6;
}

/* Imagen profesional */
.imagen-container {
    margin-top: 50px;
    background: #1a1a1a;
    padding: 25px;
    border-radius: 16px;
    text-align: center;
}

.imagen-container img {
    max-width: 100%;
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

/* Botón hamburguesa */
.menu-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    z-index: 1001;
}

/* Sidebar */
.sidebar {
    position: fixed;
    right: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: #111;
    padding-top: 80px;
    transition: 0.3s;
    box-shadow: -5px 0 15px rgba(0,0,0,0.5);
}

.sidebar a {
    display: block;
    padding: 15px 25px;
    color: white;
    text-decoration: none;
    font-size: 18px;
}

.sidebar a:hover {
    background: #222;
}

.sidebar.active {
    right: 0;
}
</style>
</head>
<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="sidebar">
    <a href="TU_LINK_DE_TWITTER" target="_blank">Twitter</a>
</div>

<header>
TinoTrader
</header>

<div class="container">
    <h1>Hola, soy TinoTrader</h1>
    <p>
        Me dedico a la inversión y al análisis de la criptomoneda River USDT.
        Comparto información, estrategias y explicaciones claras para que puedas
        entender mejor el mercado y tomar decisiones informadas.
    </p>

    <h2>Información destacada</h2>

    <div class="imagen-container">
        <img src="trading.jpg" alt="Trading Crypto">
    </div>
</div>

<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
